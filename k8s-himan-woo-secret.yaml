# Secret for sync-from-himan: WooCommerce REST API (himan.com.tr).
# HMA /ig/ai/categories/sync-from-himan endpoint uses these to fetch categories and product-category links.
#
# Create/update with real values (WooCommerce → Ayarlar → Gelişmiş → REST API → Anahtar ekle, Read):
#   kubectl create secret generic hm-himan-woo -n hm \
#     --from-literal=HIMAN_WOO_BASE_URL=https://himan.com.tr \
#     --from-literal=HIMAN_WOO_CONSUMER_KEY=ck_xxxx \
#     --from-literal=HIMAN_WOO_CONSUMER_SECRET=cs_xxxx \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Then rollout hm-app so it picks up the secret:
#   kubectl rollout restart deployment/hm-app -n hm
#
apiVersion: v1
kind: Secret
metadata:
  name: hm-himan-woo
  namespace: hm
type: Opaque
stringData:
  HIMAN_WOO_BASE_URL: "https://himan.com.tr"
  HIMAN_WOO_CONSUMER_KEY: "CHANGEME"
  HIMAN_WOO_CONSUMER_SECRET: "CHANGEME"
